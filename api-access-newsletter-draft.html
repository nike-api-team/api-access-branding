<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter Draft — API Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121c;
      --border: #2a2a45;
      --accent: #3a6df5;
      --accent-light: #7a9dff;
      --text: #f0f0f8;
      --muted: #9999b8;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page-container {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .back-link {
      display: inline-block;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 24px;
    }
    .back-link:hover { color: var(--text); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .toolbar-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-light);
    }

    .toolbar-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn-copy {
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-copy:hover { background: #4a7dff; transform: translateY(-1px); }
    .btn-copy.copied { background: #22c55e; }

    /* ── Story Picker ── */
    .picker {
      margin-bottom: 24px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .picker label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 10px;
    }

    .picker select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }
    .picker select:focus { outline: none; border-color: var(--accent); }

    /* ── Optional note ── */
    .lab-editor {
      margin-bottom: 24px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .lab-editor label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 8px;
    }

    .lab-editor textarea {
      width: 100%;
      min-height: 60px;
      padding: 12px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      resize: vertical;
    }
    .lab-editor textarea:focus { outline: none; border-color: var(--accent); }

    /* ── Email Preview Frame ── */
    .email-frame {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .email-frame-header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .email-dot { width: 8px; height: 8px; border-radius: 50%; }
    .email-dot.r { background: #e05252; }
    .email-dot.y { background: #e0a832; }
    .email-dot.g { background: #4ecb71; }

    .email-frame-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-left: 8px;
    }

    /* ── Email Content ── */
    .email-content {
      background: #0a0a0f;
      color: #f0f0f8;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    .email-inner {
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #22c55e;
      color: #fff;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 520px) {
      .toolbar { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <a href="api-access-landing.html" class="back-link">&larr; Back to API Access</a>

    <div class="toolbar">
      <div>
        <div class="toolbar-title">Newsletter Draft</div>
        <div class="toolbar-sub" id="draft-date"></div>
      </div>
      <button class="btn-copy" id="copyBtn" onclick="copyNewsletter()">Copy Newsletter</button>
    </div>

    <div class="picker">
      <label>Featured Story</label>
      <select id="storyPicker" onchange="renderEmail()"></select>
    </div>

    <div class="lab-editor">
      <label>Personal note (optional)</label>
      <textarea id="labNote" placeholder="A quick behind-the-scenes line or teaser for what's coming next. Keep it to 1-2 sentences."></textarea>
    </div>

    <div class="email-frame">
      <div class="email-frame-header">
        <div class="email-dot r"></div>
        <div class="email-dot y"></div>
        <div class="email-dot g"></div>
        <span class="email-frame-label">Email Preview</span>
      </div>

      <div class="email-content" id="emailContent">
        <div class="email-inner" id="emailInner">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copied to clipboard</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  netlifyIdentity.on('init', function(user) {
    if (!user) window.location.href = '/api-access-gate.html';
  });
  netlifyIdentity.on('logout', function() {
    window.location.href = '/api-access-gate.html';
  });

  var stories = [];

  function loadStories() {
    fetch('newsletter-content.json?v=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        stories = data.stories.sort(function(a, b) {
          return new Date(b.date) - new Date(a.date);
        });

        var picker = document.getElementById('storyPicker');
        stories.forEach(function(s, i) {
          var opt = document.createElement('option');
          opt.value = i;
          opt.textContent = s.title + '  (' + s.category + ')';
          picker.appendChild(opt);
        });

        renderEmail();

        var dateStr = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        document.getElementById('draft-date').textContent = 'Generated ' + dateStr;
      });
  }

  function renderEmail() {
    var idx = parseInt(document.getElementById('storyPicker').value) || 0;
    var story = stories[idx];
    if (!story) return;

    var note = document.getElementById('labNote').value.trim();

    var otherStories = stories.filter(function(s, i) { return i !== idx; }).slice(0, 3);

    var h = '';

    // Logo header
    h += '<div style="padding:32px 32px 24px; text-align:center;">';
    h += '<span style="font-size:18px; font-weight:900; color:#f0f0f8; letter-spacing:-0.5px;">API</span>';
    h += '<span style="font-size:18px; font-weight:300; color:#3a6df5; letter-spacing:2px; margin-left:4px;">ACCESS</span>';
    h += '</div>';

    // Hero image
    if (story.image) {
      h += '<div style="padding:0 24px;">';
      h += '<img src="' + story.image + '" alt="" style="width:100%; height:240px; object-fit:cover; border-radius:8px; display:block;" />';
      h += '</div>';
    }

    // Story content
    h += '<div style="padding:28px 32px 20px;">';

    // Category tag
    h += '<div style="margin-bottom:12px;">';
    h += '<span style="font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#3a6df5;">' + story.category + '</span>';
    h += '<span style="font-size:10px; color:#555; margin-left:12px;">' + story.source + '</span>';
    h += '</div>';

    // Title
    h += '<div style="font-size:26px; font-weight:900; color:#f0f0f8; line-height:1.2; margin-bottom:14px; letter-spacing:-0.5px;">' + story.title + '</div>';

    // Teaser
    h += '<div style="font-size:15px; color:#9999b8; line-height:1.7; margin-bottom:24px;">' + story.teaser + '</div>';

    // CTA button
    h += '<div style="margin-bottom:8px;">';
    h += '<a href="' + story.url + '" style="display:inline-block; padding:14px 36px; background:#3a6df5; color:#ffffff; text-decoration:none; font-size:14px; font-weight:700; border-radius:8px; letter-spacing:0.5px;">Read the story &rarr;</a>';
    h += '</div>';

    h += '</div>';

    // Optional personal note
    if (note) {
      h += '<div style="margin:0 32px 0; padding:20px 24px; background:#12121c; border-radius:8px; border-left:3px solid #3a6df5;">';
      h += '<div style="font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#3a6df5; margin-bottom:8px;">From the Lab</div>';
      h += '<div style="font-size:14px; color:#9999b8; line-height:1.7;">' + note.replace(/\n/g, '<br>') + '</div>';
      h += '</div>';
    }

    // Divider
    h += '<div style="padding:0 32px; margin:28px 0 0;"><div style="border-top:1px solid #2a2a45;"></div></div>';

    // Also on API Access — small text links
    if (otherStories.length > 0) {
      h += '<div style="padding:20px 32px 8px;">';
      h += '<div style="font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#555; margin-bottom:14px;">Also on API Access</div>';
      otherStories.forEach(function(s) {
        h += '<div style="margin-bottom:12px;">';
        h += '<a href="' + s.url + '" style="color:#7a9dff; text-decoration:none; font-size:13px; font-weight:600;">' + s.title + '</a>';
        h += '<span style="font-size:11px; color:#555; margin-left:8px;">' + s.category + '</span>';
        h += '</div>';
      });
      h += '</div>';
    }

    // First-time note
    h += '<div style="margin:8px 32px 0; padding:14px 16px; background:#12121c; border-radius:6px;">';
    h += '<div style="font-size:12px; color:#777; line-height:1.6;">First time visiting API Access? You\'ll be asked to set a password on your first click — check your inbox for the invite.</div>';
    h += '</div>';

    // Footer
    h += '<div style="padding:28px 32px; text-align:center;">';
    h += '<div style="font-size:12px; color:#555; line-height:1.6;">';
    h += 'Applied Performance Innovation — Nike Sport Research Lab<br>';
    h += '<a href="https://api-access.netlify.app" style="color:#7a9dff; text-decoration:none;">api-access.netlify.app</a>';
    h += '</div>';
    h += '</div>';

    document.getElementById('emailInner').innerHTML = h;
  }

  document.getElementById('labNote').addEventListener('input', renderEmail);

  function copyNewsletter() {
    var content = document.getElementById('emailContent');
    var range = document.createRange();
    range.selectNodeContents(content);

    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    try {
      document.execCommand('copy');
      var btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');

      var toast = document.getElementById('toast');
      toast.classList.add('show');

      setTimeout(function() {
        btn.textContent = 'Copy Newsletter';
        btn.classList.remove('copied');
        toast.classList.remove('show');
      }, 2500);
    } catch (err) {
      alert('Copy failed — try Ctrl+A inside the preview and Ctrl+C manually.');
    }

    sel.removeAllRanges();
  }

  loadStories();
</script>
</body>
</html>
